id: page_radar_europa
bg_color: 0x000000
widgets:
  # Main image - Europe Map
  - image:
      id: img_radar_eu
      src: img_radar_eu_baza  # Reference to ID from online_image
      align: CENTER

  # "Zoom In" button (Return to local radar)
  - button:
      x: 720
      y: 50
      width: 60
      height: 60
      bg_color: 0x222222
      bg_opa: 70%
      radius: 30
      border_width: 2
      border_color: 0x555555
      on_click:
        - lvgl.page.show: page_radar
      widgets:
        - label: 
            text: "\U000F034B"  # Icon: mdi-magnify-plus
            text_font: font_mdi
            align: CENTER
            text_color: 0xFFFFFF