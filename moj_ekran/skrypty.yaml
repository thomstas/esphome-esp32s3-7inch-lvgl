script:
  - id: screen_timeout_script
    mode: restart
    then:
      # ==================================
      # --- WAKE UP (Touch) ---
      # ==================================
      # 1. Restore brightness from slider
      - light.turn_on:
          id: screen_backlight
          brightness: !lambda 'return id(brightness_setpoint);'
          
      # 2. Reveal the top bar again
      - lvgl.obj.update:
          id: pasek_statusu
          hidden: false

      # ==================================
      # --- WAITING ---
      # ==================================
      - delay: 60s  # <-- Changed to 1 minute
      
      # ==================================
      # --- SLEEP (Day: Map / Night: Clock) ---
      # ==================================
      - if:
          condition:
            lambda: |-
              // NOTE: Make sure "ha_time" is the correct ID of your time component
              auto time = id(my_time).now();
              if (!time.is_valid()) return false;
              
              // Night: from 22:00 to 05:29
              if (time.hour >= 22 || time.hour < 5 || (time.hour == 5 && time.minute < 30)) {
                return true; // It's night
              } else {
                return false; // It's day
              }
          then:
            # --- ACTION FOR NIGHT (Screensaver) ---
            - lvgl.page.show: page_wygaszacz
            - lvgl.obj.update:
                id: pasek_statusu
                hidden: true
            - light.turn_on:
                id: screen_backlight
                brightness: 0.5
          else:
            # --- ACTION FOR DAY (Europe Map) ---
            - lvgl.page.show: page_radar_europa
            - lvgl.obj.update:
                id: pasek_statusu
                hidden: false
            - light.turn_on:
                id: screen_backlight
                brightness: !lambda 'return id(brightness_setpoint);'

  - id: turbo_25st
    then:
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.ogrzewanie
            temperature: "25"

  - id: send_temp_to_ha
    then:
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.ogrzewanie
            temperature: !lambda |-
              return str_sprintf("%.1f", id(temp_setpoint));

  - id: sync_thermostat_colors
    then:
      - lvgl.widget.update:
          id: btn_term_grzanie
          bg_color: !lambda 'return (id(hvac_mode_sensor).state == "heat") ? lv_color_hex(0xFFD700) : lv_color_hex(0xFFFFFF);'
      - lvgl.widget.update:
          id: btn_term_auto
          bg_color: !lambda 'return (id(hvac_mode_sensor).state == "auto") ? lv_color_hex(0xFFD700) : lv_color_hex(0xFFFFFF);'
      - lvgl.widget.update:
          id: btn_term_wylacz # <--- CORRECTED ID
          bg_color: !lambda 'return (id(hvac_mode_sensor).state == "off") ? lv_color_hex(0xFFD700) : lv_color_hex(0xFFFFFF);'

