id: page_wygaszacz
bg_color: 0x000000
widgets:
  # --- LARGE CLOCK ---
  - label:
      id: lbl_wygaszacz_czas
      text: "00:00"
      align: CENTER
      text_font: font_zegar_wielki
      text_color: 0x607D8B # Dark grey, easy on the eyes at night (change to 0xFFFFFF for white)
      
  # --- INVISIBLE WAKE-UP BUTTON COVERING FULL SCREEN ---
  - obj:
      x: 0
      y: 0
      width: 800
      height: 480
      bg_opa: 0       # Fully transparent
      border_width: 0 # No border
      on_click:
        - lvgl.page.show: page_dom # <-- CHANGE TO YOUR MAIN PAGE ID (e.g. page_1, page_pogoda)