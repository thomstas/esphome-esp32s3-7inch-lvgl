id: page_prognoza
bg_color: 0xEEEEEE
widgets:
  - obj:
      x: 0
      y: 45
      width: 800
      height: 435
      bg_opa: 0
      border_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"
      widgets:
        # --- HEADER AND BACK BUTTON ---
        - label: {id: lbl_prog_title_l, text: "6-DAY FORECAST", align: TOP_MID, y: 15, text_font: font_title, text_color: 0x333333}
        - button:
            x: 20
            y: 10
            width: 140
            height: 50
            bg_color: 0x9E9E9E
            on_click:
              - lvgl.page.show: page_pogoda
            widgets:
              - label: {id: lbl_prog_back_l, text: "< BACK", align: CENTER, text_font: font_btn, text_color: 0xFFFFFF}

        # ==========================================
        # --- ROW 1 ---
        # ==========================================
        # CARD 1
        - obj:
            x: 30
            y: 75
            width: 230
            height: 170
            radius: 15
            bg_color: 0xFFFFFF
            border_width: 0
            widgets:
              - label: {id: lbl_prog_day_1, text: "---", align: TOP_MID, y: 10, text_font: font_title, text_color: 0x1976D2}
              - label: {id: lbl_prog_icon_1, text: "☁", align: LEFT_MID, x: 15, y: 15, text_font: font_weather_icon, text_color: 0x9E9E9E}
              - label: {id: lbl_prog_temp_max_1, text: "-- °C", align: RIGHT_MID, x: -15, y: -5, text_font: font_title, text_color: 0xE65100}
              - label: {id: lbl_prog_temp_min_1, text: "-- °C", align: RIGHT_MID, x: -15, y: 25, text_font: font_btn, text_color: 0x2196F3}
              - label: {id: lbl_prog_desc_1, text: "Cloudy", align: BOTTOM_MID, y: -10, text_font: font_btn, text_color: 0x555555}

        # CARD 2
        - obj:
            x: 285
            y: 75
            width: 230
            height: 170
            radius: 15
