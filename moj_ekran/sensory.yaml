    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pv_icon
            # Zmieniono z lvgl::Color na samo Color
            text_color: !lambda |-
              return (x > 10) ? Color(0xFBC02D) : Color(0x9E9E9E);

  # LOGIKA DLA SIECI I DOMU
  - platform: homeassistant
    id: grid_power_logic
    entity_id: sensor.used_energy
    on_value:
      then:
        # --- ZMIANA DLA SŁUPA (SIEĆ) ---
        - lvgl.label.update:
            id: lbl_grid_icon
            # Dodano std::string(), żeby naprawić błąd c_str
            text: !lambda |-
              return (x > 0) ? std::string("\U000F192C") : std::string("\U000F192D");
            text_color: !lambda |-
              return (x > 0) ? Color(0xF44336) : Color(0x4CAF50);
        
        # --- ZMIANA DLA DOMU ---
        - lvgl.label.update:
            id: lbl_home_icon
            # Dodano std::string()
            text: !lambda |-
              return (x > 0) ? std::string("\U000F0F9C") : std::string("\U000F0F9B");
            text_color: !lambda |-
              return (x > 0) ? Color(0x4CAF50) : Color(0x2196F3);

text_sensor:
  - platform: homeassistant
    id: hvac_mode_sensor
    entity_id: climate.ogrzewanie
    on_value:
      then:
        - script.execute: sync_thermostat_colors

  - platform: homeassistant
    id: w_state
    entity_id: weather.forecast_home
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_w_state
            text: !lambda |-
              std::string stan = x;
              if (stan == "clear-night") return "Bezchmurna noc";
              if (stan == "cloudy") return "Pochmurno";
              if (stan == "fog") return "Mgła";
              if (stan == "hail") return "Grad";
              if (stan == "lightning") return "Burza";
              if (stan == "lightning-rainy") return "Burza z deszczem";
              if (stan == "partlycloudy") return "Częściowe zachm.";
              if (stan == "pouring") return "Ulewa";
              if (stan == "rainy") return "Deszczowo";
              if (stan == "snowy") return "Śnieg";
              if (stan == "snowy-rainy") return "Śnieg z deszczem";
              if (stan == "sunny") return "Słonecznie";
              if (stan == "windy") return "Wietrznie";
              return stan.c_str();
        - lvgl.label.update:
            id: lbl_w_icon
            text: !lambda |-
              std::string stan = x;
              if (stan == "clear-night") return "🌙";
              if (stan == "cloudy" || stan == "partlycloudy" || stan == "windy" || stan == "fog") return "☁";
              if (stan == "rainy" || stan == "pouring" || stan == "hail") return "☂";
              if (stan == "lightning" || stan == "lightning-rainy") return "⚡";
              if (stan == "snowy" || stan == "snowy-rainy") return "❄";
              return "☀";

  - platform: homeassistant
    id: w_sunrise
    entity_id: sensor.sun_next_rising
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_w_sunrise
            text: !lambda 'return x.substr(11, 5);'

  - platform: homeassistant
