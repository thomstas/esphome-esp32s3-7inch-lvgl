  # 5. CAŁKOWITE ZUŻYCIE DOMU
  - platform: homeassistant
    id: kr_dom_z
    entity_id: sensor.roczne_zuzycie_domu
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_kr_dom_z
            text: !lambda 'return str_sprintf("%.1f kWh", x);'
  # ==========================================
  # --- TERMOSTAT ---
  # ==========================================
  - platform: homeassistant
    id: current_temp
    entity_id: sensor.temperatura_termostat 
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_curr_temp
            text: !lambda |-
              if(std::isnan(x)) return "--.- °C";
              return str_sprintf("%.1f °C", x);

  - platform: homeassistant
    id: ha_temp_setpoint
    entity_id: climate.ogrzewanie
    attribute: temperature
    on_value:
      then:
        - globals.set:
            id: temp_setpoint
            value: !lambda "return x;"
        - lvgl.label.update:
            id: lbl_temp_set
            text: !lambda 'return str_sprintf("%.1f °C", x);'

  # --- STATUS SYGNAŁU WIFI ---

  - platform: uptime
    id: sys_uptime
    name: "Czas pracy"
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_uptime
            text: !lambda |-
              int days = int(x / 86400);
              int hours = int((int(x) % 86400) / 3600);
              int mins = int((int(x) % 3600) / 60);
              if (days > 0) {
                return str_sprintf("%d dni, %02d:%02d", days, hours, mins);
              } else {
                return str_sprintf("%02d:%02d", hours, mins);
              }

  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "WiFi Signal"
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: icon_wifi
            text_color: 0x4CAF50
        - lvgl.label.update:
            id: lbl_wifi_str
            text: !lambda 'return str_sprintf("%.0f dBm", x);'

