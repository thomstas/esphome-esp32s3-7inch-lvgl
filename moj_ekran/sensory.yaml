# --- STATUS POŁĄCZENIA API ---
# ==========================================
binary_sensor:
  - platform: status
    id: api_status
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: api_status
            then:
              - lvgl.label.update:
                  id: icon_ha
                  text_color: 0x4CAF50  # ZIELONY
            else:
              - lvgl.label.update:
                  id: icon_ha
                  text_color: 0xF44336  # CZERWONY