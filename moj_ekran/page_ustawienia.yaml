id: page_ustawienia
bg_color: 0xEEEEEE
widgets:
  - obj:
      x: 0
      y: 45
      width: 800
      height: 435
      bg_opa: 0
      border_width: 0
      pad_all: 0
      scrollbar_mode: "AUTO"
      widgets:
        # --- SEKCJA JĘZYK / LANGUAGE ---
        - label: {text: "JĘZYK / LANGUAGE", x: 30, y: 10, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 45", "770, 45"], line_color: 0xDDDDDD, line_width: 2}

        - button:
            id: btn_lang_pl
            x: 30
            y: 55
            width: 130
            height: 50
            bg_color: 0x1565C0
            on_click:
              - globals.set: {id: current_language, value: '0'}
              - script.execute: load_translations
            widgets:
              - label: {text: "PL", align: CENTER, text_font: font_title, text_color: 0xFFFFFF}

        - button:
            id: btn_lang_en
            x: 175
            y: 55
            width: 130
            height: 50
            bg_color: 0x9E9E9E
            on_click:
              - globals.set: {id: current_language, value: '1'}
              - script.execute: load_translations
            widgets:
              - label: {text: "EN", align: CENTER, text_font: font_title, text_color: 0xFFFFFF}

        # --- SEKCJA EKRANU ---
        - label: {id: lbl_set_screen_l, text: "EKRAN", x: 30, y: 120, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 155", "770, 155"], line_color: 0xDDDDDD, line_width: 2}

        - label: {id: lbl_set_bright_l, text: "Jasność podświetlenia:", x: 30, y: 175, text_font: font_btn, text_color: 0x555555}
        - slider:
            id: slider_brightness
            x: 30
            y: 205
            width: 500
            height: 40
            min_value: 10
            max_value: 100
            value: 100
            on_value:
              then:
                - globals.set:
                    id: brightness_setpoint
                    value: !lambda 'return x / 100.0;'
                - light.turn_on:
                    id: screen_backlight
                    brightness: !lambda 'return id(brightness_setpoint);'
                - lvgl.label.update:
                    id: lbl_brightness_val
                    text: !lambda 'return str_sprintf("%.0f%%", x);'
        - label:
            id: lbl_brightness_val
            text: "100%"
            x: 550
            y: 210
            text_font: font_title
            text_color: 0x1976D2

        # --- SEKCJA BATERIA (INA219) ---
        - label: {id: lbl_set_bat_l, text: "ZASILANIE I BATERIA", x: 30, y: 265, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 300", "770, 300"], line_color: 0xDDDDDD, line_width: 2}

        - label: {id: lbl_set_volt_l, text: "Napięcie:", x: 30, y: 315, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_v, text: "0.00 V", x: 160, y: 310, text_font: font_title, text_color: 0x000000}

        - label: {id: lbl_set_curr_l, text: "Natężenie:", x: 280, y: 315, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_a, text: "0.000 A", x: 420, y: 310, text_font: font_title, text_color: 0x000000}

        - label: {id: lbl_set_status_l, text: "Stan:", x: 550, y: 315, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_pct, text: "0%", x: 650, y: 310, text_font: font_title, text_color: 0x1976D2}

        - label: {id: lbl_set_power_l, text: "Aktualna moc:", x: 30, y: 360, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_w, text: "0.00 W", x: 160, y: 355, text_font: font_title, text_color: 0x000000}

        # --- SEKCJA SYSTEM ---
        - label: {text: "SYSTEM", x: 30, y: 410, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 445", "770, 445"], line_color: 0xDDDDDD, line_width: 2}

        - label: {text: "WiFi:", x: 30, y: 462, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_wifi_str, text: "-- dBm", x: 100, y: 457, text_font: font_title, text_color: 0x000000}

        - label: {text: "Uptime:", x: 280, y: 462, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_uptime, text: "--:--", x: 380, y: 457, text_font: font_title, text_color: 0x000000}