id: page_koszty
bg_color: 0xEEEEEE
widgets:
  - label:
      id: lbl_k_title_l
      text: "MONTHLY COSTS SUMMARY"
      align: TOP_MID
      y: 60
      text_font: font_title
      text_color: 0x333333

  # ==========================================
  # --- ROW 1: FOUR TILES (Consumption and Cost) ---
  # ==========================================
  # 1. HOME CONSUMPTION
  - obj:
      x: 16
      y: 110
      width: 180
      height: 130
      radius: 15
      bg_color: 0xBBDEFB
      widgets:
        - label: {id: lbl_k_dom_l, text: "HOME", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_house_z, text: "-- kWh", align: CENTER, y: 0, text_font: font_btn}
        - label: {id: lbl_k_house_k, text: "-- zł", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0x1565C0}

  # 2. REAL ELECTRICITY (Import)
  - obj:
      x: 212
      y: 110
      width: 180
      height: 130
      radius: 15
      bg_color: 0x90CAF9
      widgets:
        - label: {id: lbl_k_prad_l, text: "ELECTRICITY", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_prad_real_z, text: "-- kWh", align: CENTER, y: 0, text_font: font_btn}
        - label: {id: lbl_k_prad_real_k, text: "-- zł", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0xC62828}

  # 3. WATER (Month)
  - obj:
      x: 408
      y: 110
      width: 180
      height: 130
      radius: 15
      bg_color: 0x81D4FA
      widgets:
        - label: {id: lbl_k_woda_l, text: "WATER", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_woda_z, text: "-- m3", align: CENTER, y: 0, text_font: font_btn}
        - label: {id: lbl_k_woda_k, text: "-- zł", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0x01579B}

  # 4. GAS (Month)
  - obj:
      x: 604
      y: 110
      width: 180
      height: 130
      radius: 15
      bg_color: 0x4DD0E1
      widgets:
        - label: {id: lbl_k_gaz_l, text: "GAS", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_gaz_z, text: "-- m3", align: CENTER, y: 0, text_font: font_btn}
        - label: {id: lbl_k_gaz_m_k, text: "-- zł", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0x006064}

  # ==========================================
  # --- ROW 2: INVOICE, PV PROFIT AND STORAGE ---
  # ==========================================
  # 1. Gas Invoice
  - obj:
      x: 20
      y: 250
      width: 240
      height: 100
      radius: 15
      bg_color: 0xFFAB91
      widgets:
        - label: {id: lbl_k_gaz_inv_l, text: "GAS (INVOICE)", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_gaz_k, text: "-- zł", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0xC62828}

  # 2. PV Profit
  - obj:
      x: 280
      y: 250
      width: 240
      height: 100
      radius: 15
      bg_color: 0xA5D6A7
      widgets:
        - label: {id: lbl_k_pv_l, text: "PV PROFIT", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_zysk_pv_val, text: "0.00 zł", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0x2E7D32}

  # 3. Tauron Storage
  - obj:
      x: 540
      y: 250
      width: 240
      height: 100
      radius: 15
      bg_color: 0xD1C4E9
      widgets:
        - label: {id: lbl_k_storage_l, text: "IN STORAGE", align: TOP_MID, y: 15, text_font: font_btn}
        - label: {id: lbl_k_magazyn_val, text: "-- kWh", align: BOTTOM_MID, y: -15, text_font: font_title, text_color: 0x4527A0}

  # ==========================================
  # --- ROW 3: SUMMARY ---
  # ==========================================
  - obj:
      align: BOTTOM_MID
      y: -35
      width: 500
      height: 80
      radius: 20
      bg_color: 0xFFE082
      widgets:
        - label: {id: lbl_k_total_l, text: "TO PAY (TOTAL):", x: 30, y: 28, text_font: font_btn}
        - label: {id: lbl_k_suma, text: "-- zł", align: CENTER, y: 10, text_font: font_title, text_color: 0xC62828}