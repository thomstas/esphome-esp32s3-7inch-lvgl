id: page_settings
bg_color: 0xEEEEEE
widgets:
  - obj:
      x: 0
      y: 45
      width: 800
      height: 435
      bg_opa: 0
      border_width: 0
      pad_all: 0
      scrollbar_mode: "AUTO"
      widgets:
        # --- LANGUAGE SECTION ---
        - label: {text: "LANGUAGE", x: 30, y: 10, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 45", "770, 45"], line_color: 0xDDDDDD, line_width: 2}

        - button:
            id: btn_lang_pl
            x: 30
            y: 55
            width: 130
            height: 50
            bg_color: 0x9E9E9E
            on_click:
              - globals.set: {id: current_language, value: '0'}
              - script.execute: load_translations
            widgets:
              - label: {text: "PL", align: CENTER, text_font: font_title, text_color: 0xFFFFFF}

        - button:
            id: btn_lang_en
            x: 175
            y: 55
            width: 130
            height: 50
            bg_color: 0x1565C0
            on_click:
              - globals.set: {id: current_language, value: '1'}
              - script.execute: load_translations
            widgets:
              - label: {text: "EN", align: CENTER, text_font: font_title, text_color: 0xFFFFFF}

        # --- SCREEN SECTION ---
        - label: {id: lbl_set_screen_l, text: "SCREEN", x: 30, y: 120, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 155", "770, 155"], line_color: 0xDDDDDD, line_width: 2}

        - label: {id: lbl_set_bright_l, text: "Backlight brightness:", x: 30, y: 175, text_font: font_btn, text_color: 0x555555}
        - slider:
            id: slider_brightness
            x: 30
            y: 205
            width: 500
            height: 40
            min_value: 10
            max_value: 100
            value: 100
            on_value:
              then:
                - globals.set:
                    id: brightness_setpoint
                    value: !lambda 'return x / 100.0;'
                - light.turn_on:
                    id: screen_backlight
                    brightness: !lambda 'return id(brightness_setpoint);'
                - lvgl.label.update:
                    id: lbl_brightness_val
                    text: !lambda 'return str_sprintf("%.0f%%", x);'
        - label:
            id: lbl_brightness_val
            text: "100%"
            x: 550
            y: 210
            text_font: font_title
            text_color: 0x1976D2

        # --- BATTERY SECTION (INA219) ---
        - label: {id: lbl_set_bat_l, text: "POWER & BATTERY", x: 30, y: 265, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 300", "770, 300"], line_color: 0xDDDDDD, line_width: 2}

        - label: {id: lbl_set_volt_l, text: "Voltage:", x: 30, y: 315, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_v, text: "0.00 V", x: 160, y: 310, text_font: font_title, text_color: 0x000000}

        - label: {id: lbl_set_curr_l, text: "Current:", x: 280, y: 315, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_a, text: "0.000 A", x: 420, y: 310, text_font: font_title, text_color: 0x000000}

        - label: {id: lbl_set_status_l, text: "Status:", x: 550, y: 315, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_pct, text: "0%", x: 650, y: 310, text_font: font_title, text_color: 0x1976D2}

        - label: {id: lbl_set_power_l, text: "Current power:", x: 30, y: 360, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_bat_w, text: "0.00 W", x: 160, y: 355, text_font: font_title, text_color: 0x000000}

        # --- SYSTEM SECTION ---
        - label: {text: "SYSTEM", x: 30, y: 410, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 445", "770, 445"], line_color: 0xDDDDDD, line_width: 2}

        - label: {text: "WiFi:", x: 30, y: 462, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_wifi_str, text: "-- dBm", x: 100, y: 457, text_font: font_title, text_color: 0x000000}

        - label: {text: "Uptime:", x: 280, y: 462, text_font: font_btn, text_color: 0x555555}
        - label: {id: lbl_uptime, text: "--:--", x: 380, y: 457, text_font: font_title, text_color: 0x000000}

        # --- KIOSK MODE SECTION ---
        - label: {text: "KIOSK MODE", x: 30, y: 520, text_font: font_title, text_color: 0x333333}
        - line: {points: ["30, 555", "770, 555"], line_color: 0xDDDDDD, line_width: 2}

        - button:
            id: btn_kiosk_mode
            x: 30
            y: 565
            width: 200
            height: 55
            bg_color: !lambda 'return id(display_mode) == 1 ? lv_color_hex(0xFFD700) : lv_color_hex(0x607D8B);'
            on_click:
              - if:
                  condition:
                    lambda: 'return id(display_mode) == 1;'
                  then:
                    # Turn OFF kiosk mode
                    - globals.set: {id: display_mode, value: '0'}
                    - script.stop: display_cycle_script
                    - lvgl.widget.update:
                        id: btn_kiosk_mode
                        bg_color: 0x607D8B
                    - lvgl.label.update:
                        id: lbl_kiosk_status
                        text: "OFF"
                  else:
                    # Turn ON kiosk mode
                    - globals.set: {id: display_mode, value: '1'}
                    - script.execute: display_cycle_script
                    - lvgl.widget.update:
                        id: btn_kiosk_mode
                        bg_color: 0xFFD700
                    - lvgl.label.update:
                        id: lbl_kiosk_status
                        text: "ON"
            widgets:
              - label:
                  id: lbl_kiosk_status
                  text: !lambda 'return id(display_mode) == 1 ? "ON" : "OFF";'
                  align: CENTER
                  text_font: font_title
                  text_color: 0xFFFFFF