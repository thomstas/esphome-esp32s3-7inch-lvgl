id: page_weather
bg_color: 0xEEEEEE
widgets:
  - obj:
      x: 0
      y: 45
      width: 800
      height: 435
      bg_opa: 0
      border_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"
      widgets:
        
        # --- COLUMN 1: GENERAL CONDITIONS ---
        - obj:
            x: 10
            y: 10
            width: 250
            height: 410
            radius: 10
            bg_color: 0xFFFFFF
            border_width: 0
            widgets:
              - label: {id: lbl_wo_general, text: "GENERAL", align: TOP_MID, y: 10, text_font: font_btn, text_color: 0x333333}
              - label: {id: lbl_w_icon, text: "☀", align: CENTER, y: -140, text_font: font_weather_icon, text_color: 0xFFA500}
              - label: {id: lbl_w_state, text: "Loading...", align: CENTER, y: -90, text_font: font_title, text_color: 0x1976D2}
              - line: {points: ["10, 130", "240, 130"], line_color: 0xDDDDDD, line_width: 2}
              - label: {id: lbl_wo_outside, text: "OUTSIDE", align: TOP_MID, y: 145, text_font: font_btn, text_color: 0x555555}
              - label: {text: "Temp:", x: 10, y: 175, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_temp_out, text: "-- °C", x: 120, y: 175, text_font: font_btn, text_color: 0x000000}
              - label: {id: lbl_wo_hum_out_l, text: "Humid.:", x: 10, y: 205, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_hum_out, text: "-- %", x: 120, y: 205, text_font: font_btn, text_color: 0x000000}
              - line: {points: ["10, 250", "240, 250"], line_color: 0xDDDDDD, line_width: 2}
              - label: {id: lbl_wo_inside, text: "INSIDE", align: TOP_MID, y: 265, text_font: font_btn, text_color: 0x555555}
              - label: {text: "Temp:", x: 10, y: 295, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_temp_in, text: "-- °C", x: 120, y: 295, text_font: font_btn, text_color: 0x000000}
              - label: {id: lbl_wo_hum_in_l, text: "Humid.:", x: 10, y: 325, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_hum_in, text: "-- %", x: 120, y: 325, text_font: font_btn, text_color: 0x000000}

        # --- COLUMN 2: ATMOSPHERE AND SUN ---
        - obj:
            x: 275
            y: 10
            width: 250
            height: 410
            radius: 10
            bg_color: 0xFFFFFF
            border_width: 0
            widgets:
              - label: {id: lbl_wo_atmos, text: "ATMOSPHERE", align: TOP_MID, y: 15, text_font: font_btn, text_color: 0x333333}
              - label: {id: lbl_wo_press_l, text: "Pressure:", x: 10, y: 60, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_pres, text: "-- hPa", x: 120, y: 60, text_font: font_btn, text_color: 0x000000}
              - line: {points: ["10, 110", "240, 110"], line_color: 0xDDDDDD, line_width: 2}
              - label: {id: lbl_wo_wind_l, text: "Wind:", x: 10, y: 140, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_wind_s, text: "-- km/h", x: 120, y: 140, text_font: font_btn, text_color: 0x000000}
              - label: {id: lbl_wo_dir_l, text: "Direction:", x: 10, y: 170, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_wind_d, text: "-- °", x: 120, y: 170, text_font: font_btn, text_color: 0x000000}
              - line: {points: ["10, 220", "240, 220"], line_color: 0xDDDDDD, line_width: 2}
              - label: {id: lbl_wo_solar_l2, text: "Sunlight:", x: 10, y: 250, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_solar_l, text: "-- lx", x: 120, y: 250, text_font: font_btn, text_color: 0xE65100}
              - label: {id: lbl_wo_rad_l, text: "Radiation:", x: 10, y: 280, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_solar_r, text: "-- W/m2", x: 120, y: 280, text_font: font_btn, text_color: 0xE65100}
              - label: {id: lbl_wo_uv_l, text: "UV Index:", x: 10, y: 310, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_uv, text: "--", x: 120, y: 310, text_font: font_btn, text_color: 0xE65100}
              - line: {points: ["10, 340", "240, 340"], line_color: 0xDDDDDD, line_width: 2}
              - label: {id: lbl_wo_sunriseset, text: "SUNRISE:", x: 10, y: 350, text_font: font_btn, text_color: 0x555555}
              - label: {text: "☀", x: 80, y: 350, text_font: font_weather_mini, text_color: 0xE65100}
              - label: {id: lbl_w_sunrise, text: "--:--", x: 105, y: 350, text_font: font_btn, text_color: 0x000000}
              - label: {text: "🌙", x: 160, y: 350, text_font: font_weather_mini, text_color: 0xE65100}
              - label: {id: lbl_w_sunset, text: "--:--", x: 185, y: 350, text_font: font_btn, text_color: 0x000000}

        # --- COLUMN 3: PRECIPITATION AND BUTTONS ---
        - obj:
            x: 540
            y: 10
            width: 250
            height: 410
            radius: 10
            bg_color: 0xFFFFFF
            border_width: 0
            widgets:
              - label: {id: lbl_wo_precip, text: "PRECIP.", align: TOP_MID, y: 15, text_font: font_btn, text_color: 0x333333}
              - label: {id: lbl_wo_inst_l, text: "Instant:", x: 10, y: 60, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_rain_r, text: "-- mm/h", x: 120, y: 60, text_font: font_btn, text_color: 0x1976D2}
              - line: {points: ["10, 110", "240, 110"], line_color: 0xDDDDDD, line_width: 2}
              - label: {id: lbl_wo_today_l, text: "Today:", x: 10, y: 140, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_rain_d, text: "-- mm", x: 120, y: 140, text_font: font_btn, text_color: 0x1976D2}
              - label: {id: lbl_wo_week_l, text: "This week:", x: 10, y: 190, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_rain_w, text: "-- mm", x: 120, y: 190, text_font: font_btn, text_color: 0x1976D2}
              - label: {id: lbl_wo_month_l, text: "This month:", x: 10, y: 240, text_font: font_btn, text_color: 0x555555}
              - label: {id: lbl_w_rain_m, text: "-- mm", x: 120, y: 240, text_font: font_btn, text_color: 0x1976D2}
              
 # BUTTONS (now correctly inside column 3)
              - button:
                  x: 10
                  y: 340
                  width: 110
                  height: 60
                  bg_color: 0x2196F3
                  on_click:
                    - lvgl.page.show: page_forecast
                  widgets:
                    - label: {id: lbl_wo_fcst_btn, text: "FORECAST", align: CENTER, text_font: font_btn, text_color: 0xFFFFFF}
              
              - button:
                  x: 130
                  y: 340
                  width: 110
                  height: 60
                  bg_color: 0x607D8B
                  on_click:
                    - lvgl.page.show: page_radar
                  widgets:
                    - label: {text: "RADAR", align: CENTER, text_font: font_btn, text_color: 0xFFFFFF}