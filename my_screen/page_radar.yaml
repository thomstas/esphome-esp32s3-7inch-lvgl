id: page_radar
bg_color: 0x000000

widgets:
  # Main image - Map
  - image:
      id: widget_mapy
      src: img_mapa_tlo
      align: CENTER

  # "Back" button (Return to weather)
  - button:
      x: 20
      y: 50
      width: 60
      height: 60
      bg_color: 0x222222
      bg_opa: 70%
      radius: 30
      border_width: 2
      border_color: 0x555555
      on_click:
        - script.stop: radar_local_fetch_loop
        - lvgl.page.show: page_weather
      widgets:
        - label:
            text: "\U000F004D"  # Icon: mdi-arrow-left
            text_font: font_mdi
            align: CENTER
            text_color: 0xFFFFFF

  # "Zoom Out" button (Jump to Europe)
  - button:
      x: 720
      y: 50
      width: 60
      height: 60
      bg_color: 0x222222
      bg_opa: 70%
      radius: 30
      border_width: 2
      border_color: 0x555555
      on_click:
        - script.stop: radar_local_fetch_loop
        - lvgl.page.show: page_radar_europe
        - script.execute: radar_europe_fetch_loop
      widgets:
        - label: 
            text: "\U000F034A"  # Icon: mdi-magnify-minus
            text_font: font_mdi
            align: CENTER
            text_color: 0xFFFFFF