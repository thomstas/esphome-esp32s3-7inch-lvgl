interval:
  # --- FAST LOOP: Clock and battery (every 5 seconds) ---
  - interval: 5s
    then:
      - if:
          condition:
            time.has_time:
          then:
            - lvgl.label.update:
                id: lbl_time
                text: !lambda 'return id(my_time).now().strftime("%H:%M");'
            - lvgl.label.update:
                id: lbl_wygaszacz_czas
                text: !lambda 'return id(my_time).now().strftime("%H:%M");'  
            - lvgl.label.update:
                id: lbl_bat_top
                text: !lambda 'return str_sprintf("%.0f%%", id(bat_pct).state);'
            - lvgl.label.update:
                id: icon_bat
                text: !lambda |-
                  float pct = id(bat_pct).state;
                  if (pct > 80) return "\U000F0085"; 
                  if (pct > 50) return "\U000F0087"; 
                  if (pct > 20) return "\U000F0089"; 
                  if (pct > 5)  return "\U000F008C"; 
                  return "\U000F008E";               

  # --- SLOW LOOP: Date and days of the week (every 1 hour) ---
  - interval: 1h
    then:
      - if:
          condition:
            time.has_time:
          then:
            - lvgl.label.update:
                id: lbl_date
                text: !lambda |-
                  auto t = id(my_time).now();
                  if (id(current_language) == 0) {
                    const char* days[] = {"", "Niedziela", "Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota"};
                    return str_sprintf("%s, %02d.%02d.%04d", days[t.day_of_week], t.day_of_month, t.month, t.year);
                  } else {
                    const char* days[] = {"", "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
                    return str_sprintf("%s, %02d.%02d.%04d", days[t.day_of_week], t.day_of_month, t.month, t.year);
                  }
            
            - lvgl.label.update:
                id: lbl_prog_day_1
                text: !lambda |-
                  auto t = id(my_time).now();
                  if (id(current_language) == 0) {
                    const char* days[] = {"", "NIEDZIELA", "PONIEDZIAŁEK", "WTOREK", "ŚRODA", "CZWARTEK", "PIĄTEK", "SOBOTA"};
                    return days[t.day_of_week];
                  } else {
                    const char* days[] = {"", "SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"};
                    return days[t.day_of_week];
                  }
            - lvgl.label.update:
                id: lbl_prog_day_2
                text: !lambda |-
                  auto t = id(my_time).now();
                  if (id(current_language) == 0) {
                    const char* days[] = {"", "NIEDZIELA", "PONIEDZIAŁEK", "WTOREK", "ŚRODA", "CZWARTEK", "PIĄTEK", "SOBOTA"};
                    return days[(t.day_of_week % 7) + 1];
                  } else {
                    const char* days[] = {"", "SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"};
                    return days[(t.day_of_week % 7) + 1];
                  }
            - lvgl.label.update:
                id: lbl_prog_day_3
                text: !lambda |-
                  auto t = id(my_time).now();
                  if (id(current_language) == 0) {
                    const char* days[] = {"", "NIEDZIELA", "PONIEDZIAŁEK", "WTOREK", "ŚRODA", "CZWARTEK", "PIĄTEK", "SOBOTA"};
                    return days[((t.day_of_week + 1) % 7) + 1];
                  } else {
