script:
  - id: screen_timeout_script
    mode: restart
    then:
      # ==================================
      # --- WAKE UP (Touch) ---
      # ==================================
      - light.turn_on:
          id: screen_backlight
          brightness: !lambda 'return id(brightness_setpoint);'
          
      - lvgl.obj.update:
          id: pasek_statusu
          hidden: false

      # PAUSE THE CAROUSEL WHILE INTERACTING!
      - script.stop: display_cycle_script

      # ==================================
      # --- WAITING ---
      # ==================================
      - delay: 60s
      
      # ==================================
      # --- SLEEP LOGIC ---
      # ==================================
      - if:
          condition:
            lambda: 'return id(display_mode) == 0;' # NORMAL MODE
          then:
            - if:
                condition:
                  lambda: |-
                    auto time = id(my_time).now();
                    if (!time.is_valid()) return false;
                    // Night: 22:00 to 05:29
                    if (time.hour >= 22 || time.hour < 5 || (time.hour == 5 && time.minute < 30)) {
                      return true;
                    } else {
                      return false;
                    }
                then:
                  # --- ACTION FOR NIGHT (Clock screensaver) ---
                  - lvgl.page.show: page_screensaver
                  - lvgl.obj.update: { id: pasek_statusu, hidden: true }
                  - light.turn_on: { id: screen_backlight, brightness: 0.2 }
                else:
                  # --- ACTION FOR DAY (Radar map) ---
                  - lvgl.page.show: page_radar_europe
                  - lvgl.obj.update: { id: pasek_statusu, hidden: false }
                  - light.turn_on: { id: screen_backlight, brightness: !lambda 'return id(brightness_setpoint);' }
          else:
            # KIOSK MODE - RESUME CAROUSEL AFTER 60s OF INACTIVITY
            - script.execute: display_cycle_script

  # --- Automatic Page Cycle (Loop Mode: 10s per page) ---
  - id: display_cycle_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(display_mode) == 1;'
          then:
            - lvgl.page.show: page_home
            - delay: 10s
            - lvgl.page.show: page_thermostat
            - delay: 10s
            - lvgl.page.show: page_media
            - delay: 10s
            - lvgl.page.show: page_weather
            - delay: 10s
            - lvgl.page.show: page_power
            - delay: 10s
            - lvgl.page.show: page_costs
            - delay: 10s
            - lvgl.page.show: page_annual_costs
            - delay: 10s
# --- CAMERA PAGE LOGIC ---
            - lvgl.page.show: page_camera
            - script.execute: camera_fetch_loop # Start streaming for 10s
            - delay: 10s
            - script.stop: camera_fetch_loop    # Stop streaming before moving on

  - id: turbo_25st
    then:
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.ogrzewanie
            temperature: "25"

  - id: send_temp_to_ha
    then:
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.ogrzewanie
            temperature: !lambda |-
              return str_sprintf("%.1f", id(temp_setpoint));

  - id: sync_thermostat_colors
    then:
      - lvgl.widget.update:
          id: btn_term_grzanie
          bg_color: !lambda 'return (id(hvac_mode_sensor).state == "heat") ? lv_color_hex(0xFFD700) : lv_color_hex(0xFFFFFF);'
      - lvgl.widget.update:
          id: btn_term_auto
          bg_color: !lambda 'return (id(hvac_mode_sensor).state == "auto") ? lv_color_hex(0xFFD700) : lv_color_hex(0xFFFFFF);'
      - lvgl.widget.update:
          id: btn_term_wylacz
          bg_color: !lambda 'return (id(hvac_mode_sensor).state == "off") ? lv_color_hex(0xFFD700) : lv_color_hex(0xFFFFFF);'
   
