            - label: {id: lbl_menu_rok, text: "YEAR", text_font: font_title, align: RIGHT_MID, x: -45, text_color: 0xFFFFFF}

      - button:
          x: 290
          y: 285
          width: 240
          height: 65
          bg_color: 0x607D8B
          on_click:
            - lvgl.page.show: page_settings
            - lvgl.obj.update: {id: my_menu_window, hidden: true}
          widgets:
            - label: {text: "\U000F0493", text_font: font_mdi, align: LEFT_MID, x: 20, text_color: 0xFFFFFF}
            - label: {text: "SYSTEM", text_font: font_title, align: RIGHT_MID, x: -20, text_color: 0xFFFFFF}

      # --- ROW 5 (CAMERA & Future Extensions) ---
      - button:
          x: 30
          y: 360
          width: 240
          height: 65
          bg_color: 0x009688
          on_click:
            - lvgl.page.show: page_camera
