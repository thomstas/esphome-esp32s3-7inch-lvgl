            - label: {id: lbl_menu_koszty, text: "COSTS", text_font: font_title, align: RIGHT_MID, x: -25, text_color: 0xFFFFFF}

      # --- ROW 4 ---
      - button:
          x: 30
          y: 285
          width: 240
          height: 65
          bg_color: 0x3F51B5
          on_click:
            - lvgl.page.show: page_annual_costs
            - lvgl.obj.update: {id: my_menu_window, hidden: true}
          widgets:
