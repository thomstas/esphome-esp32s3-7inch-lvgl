esphome:
  name: lcd
  friendly_name: "LCD"
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288
  on_boot:
    priority: -100
    then:
      - delay: 5s
      - script.execute: sync_ui_colors
      - script.execute: screen_timeout_script
      - script.execute: sync_thermostat_colors
      - script.execute: load_translations
      - lvgl.slider.update:
          id: slider_brightness
          value: !lambda 'return id(brightness_setpoint) * 100;'
      - lvgl.label.update:
          id: lbl_brightness_val
          text: !lambda 'return str_sprintf("%.0f%%", id(brightness_setpoint) * 100);'
      - lvgl.page.show: page_radar_europe
esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_DIO: "y"
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_COMPILER_OPTIMIZATION_DEFAULT: "y"

psram:
  mode: octal
  speed: 80MHz
http_request:
  verify_ssl: false
logger:


api:
  encryption:
    key: !secret api_encryption_key

  services:
    - service: pokaz_okno_menu
      then:
        - lvgl.obj.update:
            id: my_menu_window
            hidden: false
    - service: zamknij_okno_menu
      then:
        - lvgl.obj.update:
            id: my_menu_window
            hidden: true
    - service: pokaz_strone_dom
      then:
        - lvgl.page.show: page_home
    - service: pokaz_strone_termostat
      then:
        - lvgl.page.show: page_thermostat
    - service: pokaz_strone_media
      then:
        - lvgl.page.show: page_media
    - service: pokaz_strone_zasilanie
      then:
        - lvgl.page.show: page_power
    - service: pokaz_strone_pogoda
      then:
        - lvgl.page.show: page_weather
    - service: pokaz_strone_koszty
      then:
        - lvgl.page.show: page_costs
    - service: pokaz_strone_ustawienia
      then:
        - lvgl.page.show: page_settings
    - service: pokaz_strone_prognoza
      then:
        - lvgl.page.show: page_forecast
    - service: pokaz_strone_wygaszacz
      then:
        - lvgl.page.show: page_screensaver   
    - service: pokaz_strone_radar
      then:
        - lvgl.page.show: page_radar     
    - service: pokaz_strone_radar_europa
      then:
        - lvgl.page.show: page_radar_europe
    - service: pokaz_strone_koszty_roczne
      then:
        - lvgl.page.show: page_annual_costs
    - service: toggle_language
      then:
        - globals.set:
            id: current_language
            value: !lambda 'return id(current_language) == 0 ? 1 : 0;'
        - script.execute: load_translations                     

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
# --- LOADING SEPARATE MODULES ---
sensor: !include my_screen/battery.yaml
font: !include my_screen/fonts.yaml
online_image: !include my_screen/images.yaml
time:
  - platform: homeassistant
    id: my_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"
    on_time:
      # At 22:00 -> go to screensaver
      - seconds: 0
        minutes: 0
        hours: 22
        then:
          - lvgl.page.show: page_screensaver
          - lvgl.obj.update: {id: pasek_statusu, hidden: true}
          - light.turn_on: {id: screen_backlight, brightness: 0.5}

      # At 05:30 -> go to Europe map
      - seconds: 0
        minutes: 30
        hours: 5
        then:
          - lvgl.page.show: page_radar_europe
          - lvgl.obj.update: {id: pasek_statusu, hidden: false}
          - light.turn_on: {id: screen_backlight, brightness: !lambda 'return id(brightness_setpoint);'}


spi:
  clk_pin: 11
  mosi_pin: 12

display:
  - platform: mipi_rgb
    id: my_display
    model: CUSTOM
    dimensions: { width: 800, height: 480 }
    color_order: RGB
    pclk_frequency: 16MHz
    pclk_inverted: true
    auto_clear_enabled: false
    update_interval: never
    init_sequence: []
    de_pin: 5
    hsync_pin: 46
    vsync_pin: 3
    pclk_pin: 7
    data_pins:
      red:   [1, 2, 42, 41, 40]
      green: [39, 0, 45, 48, 47, 21]
      blue:  [14, 38, 18, 17, 10]
    hsync_front_porch: 40
    hsync_pulse_width: 48
    hsync_back_porch: 40
    vsync_front_porch: 13
    vsync_pulse_width: 1
    vsync_back_porch: 31

i2c:
  sda: 8
  scl: 9
  scan: true

output:
  - platform: ledc
    id: backlight_pwm
    pin: 16
    frequency: 1000 Hz         # Lower frequency for smoother transitions at low brightness levels
    min_power: 20%             # Hardware dead-zone calibration (20% physical power equals 1% in HA)
    zero_means_zero: true      # Ensures the screen turns off completely when set to 0% in HA

light:
  - platform: monochromatic
    id: screen_backlight
    name: "Screen Backlight"
    output: backlight_pwm
 
touchscreen:
  - platform: gt911
    id: my_touch
    display: my_display
    interrupt_pin: 4
    on_touch:
      - light.turn_on:
          id: screen_backlight
          brightness: !lambda 'return id(brightness_setpoint);'
      - script.execute: screen_timeout_script

globals:
  - id: temp_setpoint
    type: float
    initial_value: '21.0'
  - id: brightness_setpoint
    type: float
    initial_value: '1.0'
    restore_value: yes

packages:
  home_data: !include my_screen/sensors.yaml
  scripts: !include my_screen/scripts.yaml
  intervals: !include my_screen/intervals.yaml
  languages: !include my_screen/languages.yaml
lvgl:
  displays: [my_display]
  touchscreens: [my_touch]
  buffer_size: 100%
  top_layer:
    widgets: !include my_screen/ui_shell.yaml
  pages:
    - !include my_screen/page_home.yaml
    - !include my_screen/page_thermostat.yaml
    - !include my_screen/page_media.yaml
    - !include my_screen/page_weather.yaml
    - !include my_screen/page_power.yaml
    - !include my_screen/page_costs.yaml
    - !include my_screen/page_settings.yaml
    - !include my_screen/page_forecast.yaml
    - !include my_screen/page_screensaver.yaml
    - !include my_screen/page_radar.yaml
    - !include my_screen/page_radar_europe.yaml
    - !include my_screen/page_annual_costs.yaml
